<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Básico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Meu Site Básico</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">Sobre</a>
                <a href="#">Contato</a>
            </nav>
    </header>
    <main>
        <aside>
            <div id="um">
                <h2>Bem-vindo!</h2>
                <p>Este é um site de exemplo para praticar<br> HTML, CSS e JavaScript</p>
                <button id="btn">Clique em Mim</button>
            </div>
            <div id="dois">
                <h2>Contador:</h2>
                <p id="res">0</p>
                <button id="add">+ Adicionar</button>
            </div>
        </aside>
        <section>
            <h2>Galeria de Imagens</h2>
            <div id="container">
                <div class="imagem">Imagem 1</div>
                <div class="imagem">Imagem 2</div>
                <div class="imagem">Imagem 3</div>
                <div class="imagem">Imagem 4</div>
                <div class="imagem">Imagem 5</div>
                <div class="imagem">Imagem 6</div>
            </div>
        </section>
        <article>
            <h2>Envie uma Mensagem:</h2>
            <div id="nome1">
                <p>Nome: </p>
                <input type="text" id="nome">
            </div>
            <div id="msg">
                <p>Mensagem: </p>
                <input type="text" id="mensagem">
            </div>
            <button>Enviar</button>
        </article>
    </main>
    <script src="script.js"></script>
</body>
</html>
